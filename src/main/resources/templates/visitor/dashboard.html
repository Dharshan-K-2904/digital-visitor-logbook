<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Requests – Visitor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
body{background:#f0f2f5;font-family:"Segoe UI",sans-serif;margin:0}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:235px;background:#004d40;display:flex;flex-direction:column;z-index:100}
.sidebar .brand{padding:22px 20px;font-size:1rem;font-weight:700;color:#fff;border-bottom:1px solid #00695c;display:flex;align-items:center;gap:9px}
.sidebar a{color:#b2dfdb;text-decoration:none;padding:13px 20px;display:flex;align-items:center;gap:10px;font-size:.93rem;transition:background .15s}
.sidebar a:hover,.sidebar a.active{background:#00695c;color:#fff}
.sidebar a i{width:20px}
.sidebar .logout{margin-top:auto;border-top:1px solid #00695c}
.content{margin-left:235px;padding:34px}
.card{border:none;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);background:#fff}
.table thead th{background:#e0f2f1;color:#004d40;font-weight:600;font-size:.86rem;border-bottom:none;padding:12px 16px}
.table tbody td{font-size:.86rem;vertical-align:middle;padding:11px 16px}
.bs{display:inline-block;border-radius:20px;padding:3px 13px;font-size:.75rem;font-weight:700}
.s-PENDING{background:#fff3e0;color:#e65100}.s-APPROVED{background:#e8f5e9;color:#2e7d32}
.s-REJECTED{background:#ffebee;color:#c62828}.s-CHECKED_IN{background:#e3f2fd;color:#1565c0}
.s-CHECKED_OUT{background:#f3e5f5;color:#6a1b9a}
.sc{border-radius:16px;padding:24px;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.14)}
.sn{font-size:2.4rem;font-weight:800;line-height:1}.sl{font-size:.83rem;opacity:.88;margin-top:7px}
.ca{background:linear-gradient(135deg,#f59e0b,#d97706)}
.cb{background:linear-gradient(135deg,#10b981,#059669)}
.cc{background:linear-gradient(135deg,#ef4444,#dc2626)}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand"><i class="bi bi-person-circle"></i> Visitor Portal</div>
  <a th:href="@{/visitor/dashboard}" class="active"><i class="bi bi-speedometer2"></i> My Requests</a>
  <a th:href="@{/visitor/request/new}"><i class="bi bi-plus-circle"></i> New Request</a>
  <a th:href="@{/logout}" class="logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
</div>
<div class="content">
  <h4 class="fw-bold mb-1">My Visit Requests</h4>
  <p class="text-muted mb-4">Welcome, <strong th:text="${user?.name}">Visitor</strong></p>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 px-3 mb-3" style="border-radius:10px">
    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4"><div class="sc ca">
      <div class="sn" th:text="${pending}">0</div>
      <div class="sl"><i class="bi bi-hourglass-split me-1"></i>Pending</div>
    </div></div>
    <div class="col-md-4"><div class="sc cb">
      <div class="sn" th:text="${approved}">0</div>
      <div class="sl"><i class="bi bi-check-circle me-1"></i>Approved</div>
    </div></div>
    <div class="col-md-4"><div class="sc cc">
      <div class="sn" th:text="${rejected}">0</div>
      <div class="sl"><i class="bi bi-x-circle me-1"></i>Rejected</div>
    </div></div>
  </div>

  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3 px-4">
      <span class="fw-semibold">All My Requests</span>
      <a th:href="@{/visitor/request/new}" class="btn btn-sm btn-primary">
        <i class="bi bi-plus me-1"></i>New Request</a>
    </div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead><tr><th>#</th><th>Host</th><th>Purpose</th><th>Visit Date</th><th>Status</th><th>Rejection Reason</th></tr></thead>
        <tbody>
          <tr th:each="r : ${requests}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.hostName}"></td>
            <td th:text="${r.purpose}"></td>
            <td><span th:if="${r.visitDate!=null}" th:text="${#temporals.format(r.visitDate,'dd MMM yyyy')}"></span></td>
            <td><span th:if="${r.status!=null}" th:class="${'bs s-'+r.status}" th:text="${r.status}"></span></td>
            <td class="text-muted" th:text="${r.rejectionReason!=null?r.rejectionReason:'—'}"></td>
          </tr>
          <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="6" class="text-center text-muted py-5">
              <i class="bi bi-inbox fs-3 d-block mb-2 opacity-50"></i>
              No requests yet. <a th:href="@{/visitor/request/new}">Submit one!</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
