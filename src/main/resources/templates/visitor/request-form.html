<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Request – Visitor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
body{background:#f0f2f5;font-family:"Segoe UI",sans-serif;margin:0}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:235px;background:#004d40;display:flex;flex-direction:column;z-index:100}
.sidebar .brand{padding:22px 20px;font-size:1rem;font-weight:700;color:#fff;border-bottom:1px solid #00695c;display:flex;align-items:center;gap:9px}
.sidebar a{color:#b2dfdb;text-decoration:none;padding:13px 20px;display:flex;align-items:center;gap:10px;font-size:.93rem;transition:background .15s}
.sidebar a:hover,.sidebar a.active{background:#00695c;color:#fff}
.sidebar .logout{margin-top:auto;border-top:1px solid #00695c}
.content{margin-left:235px;padding:34px}
.card{border:none;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);background:#fff}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand"><i class="bi bi-person-circle"></i> Visitor Portal</div>
  <a th:href="@{/visitor/dashboard}"><i class="bi bi-speedometer2"></i> My Requests</a>
  <a th:href="@{/visitor/request/new}" class="active"><i class="bi bi-plus-circle"></i> New Request</a>
  <a th:href="@{/logout}" class="logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
</div>
<div class="content">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/visitor/dashboard}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0">Submit Visit Request</h4>
  </div>
  <div th:if="${error}" class="alert alert-danger py-2 px-3 mb-3" style="border-radius:10px">
    <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span></div>
  <div class="card" style="max-width:580px">
    <div class="card-body p-4">
      <form th:action="@{/visitor/request/submit}" th:object="${req}" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Select Host (Employee to Visit)</label>
          <select name="hostId" class="form-select" required>
            <option value="">-- Choose Host --</option>
            <option th:each="h : ${hosts}" th:value="${h.id}" th:text="${h.name}"></option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Purpose of Visit</label>
          <input type="text" class="form-control" th:field="*{purpose}"
                 placeholder="e.g. Project discussion, Interview, Delivery..." required/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Visit Date</label>
          <input type="date" class="form-control" th:field="*{visitDate}" required/>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-send me-1"></i>Submit Request</button>
          <a th:href="@{/visitor/dashboard}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
