<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Request – Visitor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<style>
  .sidebar{background:linear-gradient(180deg,#064e3b 0%,#022c22 100%) !important;}
  .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,0.08) !important;border-left-color:#34d399 !important;}
  .sidebar-avatar{background:linear-gradient(135deg,#059669,#047857) !important;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand"><i class="bi bi-person-circle"></i> Visitor Portal</div>
  <a th:href="@{/visitor/profile}" class="sidebar-user">
    <div class="sidebar-avatar">
      <span th:text="${user != null and user.name != null ? #strings.substring(user.name,0,1).toUpperCase() : 'V'}">V</span>
    </div>
    <div class="sidebar-user-info">
      <div class="name" th:text="${user != null ? user.name : 'Visitor'}">Visitor</div>
      <div class="role">Visitor</div>
    </div>
  </a>
  <a th:href="@{/visitor/dashboard}"><i class="bi bi-speedometer2"></i> My Requests</a>
  <a th:href="@{/visitor/request/new}" class="active"><i class="bi bi-plus-circle"></i> New Request</a>
  <div class="nav-section">Account</div>
  <a th:href="@{/visitor/profile}"><i class="bi bi-person-circle"></i> My Profile</a>
  <div class="logout"><a th:href="@{/logout}"><i class="bi bi-box-arrow-left"></i> Logout</a></div>
</div>

<div class="content fade-in">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/visitor/dashboard}" class="btn btn-outline-secondary btn-sm" style="border-radius:8px">
      <i class="bi bi-arrow-left"></i></a>
    <div>
      <h4 class="fw-bold mb-0">Submit Visit Request</h4>
      <p class="text-muted mb-0 small">Request to visit a host in the building</p>
    </div>
  </div>

  <div th:if="${error}" class="alert alert-danger py-2 px-3 mb-3" style="border-radius:12px">
    <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
  </div>

  <div class="card" style="max-width:600px">
    <div class="card-body p-4">
      <form th:action="@{/visitor/request/submit}" th:object="${req}" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Select Host (Employee to Visit)</label>
          <select name="hostId" class="form-select" required>
            <option value="">-- Choose Host --</option>
            <option th:each="h : ${hosts}" th:value="${h.id}" th:text="${h.name}"></option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Purpose of Visit</label>
          <input type="text" class="form-control" th:field="*{purpose}"
                 placeholder="e.g. Project discussion, Interview, Delivery..." required/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Visit Date</label>
          <input type="date" class="form-control" th:field="*{visitDate}" required/>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4" style="border-radius:10px;font-weight:600">
            <i class="bi bi-send me-1"></i>Submit Request</button>
          <a th:href="@{/visitor/dashboard}" class="btn btn-outline-secondary" style="border-radius:10px">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
