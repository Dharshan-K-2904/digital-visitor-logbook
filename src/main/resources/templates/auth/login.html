<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login – Visitor Logbook</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}
body{min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;
     background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#4c1d95 100%);
     font-family:'Inter','Segoe UI',sans-serif}
.card{border:none;border-radius:22px;box-shadow:0 24px 64px rgba(0,0,0,.4);padding:48px 40px;width:100%;max-width:450px;background:#fff}
.icon{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
      display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:#fff;font-size:2rem;
      box-shadow:0 10px 28px rgba(79,70,229,.4)}
.form-control{border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:.9rem;font-family:inherit}
.form-control:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12);outline:none}
.input-group-text{border:1.5px solid #e2e8f0;border-radius:10px 0 0 10px;border-right:none;background:#f8fafc;color:#64748b}
.input-group .form-control{border-radius:0 10px 10px 0}
.form-label{font-size:.82rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.4px}
.btn-login{background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:12px;
            padding:13px;font-weight:700;font-size:.95rem;letter-spacing:.3px;transition:opacity .2s,transform .15s;font-family:inherit}
.btn-login:hover{opacity:.9;transform:translateY(-1px);color:#fff}
.divider{text-align:center;position:relative;margin:24px 0}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#e2e8f0}
.divider span{background:#fff;padding:0 12px;position:relative;color:#94a3b8;font-size:.8rem}
.hint{background:#f8fafc;border-radius:16px;padding:20px;margin-top:28px;border:1px solid #e2e8f0}
.hint-title{font-size:.68rem;font-weight:800;color:#6366f1;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.hint table{width:100%}.hint td{padding:4px 0;font-size:.8rem}
.lbl{color:#94a3b8;font-weight:500}.val{font-weight:600;color:#1e293b;text-align:right;font-family:monospace}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="bi bi-shield-lock-fill"></i></div>
  <h4 class="text-center fw-bold mb-1">Visitor Logbook</h4>
  <p class="text-center text-muted mb-4" style="font-size:.88rem">Sign in to your account</p>

  <div th:if="${error}" class="alert alert-danger d-flex align-items-center py-2 mb-3" style="font-size:.88rem;border-radius:10px">
    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
  </div>
  <div th:if="${success}" class="alert alert-success d-flex align-items-center py-2 mb-3" style="font-size:.88rem;border-radius:10px">
    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
  </div>

  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-login w-100 text-white">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <div class="divider"><span>Don't have an account?</span></div>
  <a th:href="@{/register}" class="btn btn-outline-secondary w-100" style="border-radius:12px;font-weight:600">
    <i class="bi bi-person-plus me-2"></i>Create Account
  </a>

  <div class="hint">
    <div class="hint-title"><i class="bi bi-info-circle-fill"></i> Demo Credentials</div>
    <table>
      <tr><td class="lbl">Administrator</td> <td class="val">admin@test.com / admin123</td></tr>
      <tr><td class="lbl">Host Employee</td>  <td class="val">host@test.com / host123</td></tr>
      <tr><td class="lbl">Security Guard</td> <td class="val">security@test.com / security123</td></tr>
      <tr><td class="lbl">Bob Visitor</td>    <td class="val">visitor@test.com / visitor123</td></tr>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
