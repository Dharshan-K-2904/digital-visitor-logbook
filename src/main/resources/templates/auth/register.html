<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Register – Visitor Logbook</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}
body{min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;
     background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#4c1d95 100%);
     font-family:'Inter','Segoe UI',sans-serif}
.card{border:none;border-radius:22px;box-shadow:0 24px 64px rgba(0,0,0,.4);padding:48px 40px;width:100%;max-width:450px;background:#fff}
.icon{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
      display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:#fff;font-size:2rem;
      box-shadow:0 10px 28px rgba(79,70,229,.4)}
.form-control,.form-select{border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:.9rem;font-family:inherit}
.form-control:focus,.form-select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12);outline:none}
.form-label{font-size:.82rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.4px}
.btn-register{background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:12px;
              padding:13px;font-weight:700;font-size:.95rem;letter-spacing:.3px;transition:opacity .2s,transform .15s;font-family:inherit}
.btn-register:hover{opacity:.9;transform:translateY(-1px)}
.divider{text-align:center;position:relative;margin:20px 0}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#e2e8f0}
.divider span{background:#fff;padding:0 12px;position:relative;color:#94a3b8;font-size:.8rem}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="bi bi-person-plus-fill"></i></div>
  <h4 class="text-center fw-bold mb-1">Create Account</h4>
  <p class="text-center text-muted mb-4" style="font-size:.88rem">Join the Visitor Logbook system</p>

  <div th:if="${error}" class="alert alert-danger d-flex align-items-center py-2 mb-3" style="font-size:.88rem;border-radius:10px">
    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
  </div>
  <div th:if="${success}" class="alert alert-success d-flex align-items-center py-2 mb-3" style="font-size:.88rem;border-radius:10px">
    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
  </div>

  <form th:action="@{/register}" method="post">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="John Smith" required autofocus/>
    </div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
    </div>
    <div class="mb-4">
      <label class="form-label">Role</label>
      <select name="role" class="form-select">
        <option value="VISITOR">👤 Visitor</option>
        <option value="HOST">👨‍💼 Host (Employee)</option>
        <option value="SECURITY">🛡️ Security Personnel</option>
        <option value="ADMIN">👑 Administrator</option>
      </select>
    </div>
    <button type="submit" class="btn btn-register w-100 text-white">
      <i class="bi bi-person-check me-2"></i>Create Account
    </button>
  </form>

  <div class="divider"><span>Already have an account?</span></div>
  <a th:href="@{/login}" class="btn btn-outline-secondary w-100" style="border-radius:12px;font-weight:600">
    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
  </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
