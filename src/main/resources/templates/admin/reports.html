<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reports – Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="sidebar">
  <div class="brand"><i class="bi bi-shield-lock-fill"></i> Admin Panel</div>
  <a th:href="@{/admin/profile}" class="sidebar-user">
    <div class="sidebar-avatar" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">
      <span th:text="${user.name != null ? #strings.substring(user.name,0,1).toUpperCase() : 'A'}">A</span>
    </div>
    <div class="sidebar-user-info">
      <div class="name" th:text="${user.name}">Admin</div>
      <div class="role">Administrator</div>
    </div>
  </a>
  <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a th:href="@{/admin/users}"><i class="bi bi-people"></i> User Management</a>
  <a th:href="@{/admin/reports}" class="active"><i class="bi bi-file-earmark-bar-graph"></i> Visit Reports</a>
  <div class="nav-section">System</div>
  <a th:href="@{/admin/settings}"><i class="bi bi-gear"></i> System Settings</a>
  <a th:href="@{/admin/profile}"><i class="bi bi-person-badge"></i> My Profile</a>
  <div class="logout"><a th:href="@{/logout}"><i class="bi bi-box-arrow-left"></i> Logout</a></div>
</div>
<div class="content fade-in">
  <div class="page-header">
    <div><h4>Visitor Reports</h4><p>Filter and review all visit logs</p></div>
  </div>
  <div class="card mb-4">
    <div class="card-body px-4 py-3">
      <form th:action="@{/admin/reports/filter}" method="get" class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label fw-semibold small">From Date</label>
          <input type="date" name="from" class="form-control" th:value="${from!=null?from.toString():''}"/>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold small">To Date</label>
          <input type="date" name="to" class="form-control" th:value="${to!=null?to.toString():''}"/>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold small">Status</label>
          <select name="status" class="form-select">
            <option value="">All Statuses</option>
            <option th:selected="${status=='PENDING'}"     value="PENDING">Pending</option>
            <option th:selected="${status=='APPROVED'}"    value="APPROVED">Approved</option>
            <option th:selected="${status=='REJECTED'}"    value="REJECTED">Rejected</option>
            <option th:selected="${status=='CHECKED_IN'}"  value="CHECKED_IN">Checked In</option>
            <option th:selected="${status=='CHECKED_OUT'}" value="CHECKED_OUT">Checked Out</option>
          </select>
        </div>
        <div class="col-md-3 d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-fill" style="border-radius:10px">
            <i class="bi bi-funnel me-1"></i>Filter</button>
          <a th:href="@{/admin/reports}" class="btn btn-outline-secondary flex-fill" style="border-radius:10px">Reset</a>
        </div>
      </form>
    </div>
  </div>
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <span class="text-muted small">Showing <strong th:text="${#lists.size(logs)}">0</strong> record(s)</span>
    <div class="d-flex gap-2 flex-wrap">
      <a th:href="@{/admin/reports/download(format='csv',from=${from},to=${to},status=${status})}"
         class="btn btn-sm btn-outline-success" style="border-radius:8px">
        <i class="bi bi-filetype-csv me-1"></i>CSV</a>
      <a th:href="@{/admin/reports/download(format='pdf',from=${from},to=${to},status=${status})}"
         class="btn btn-sm btn-outline-danger" style="border-radius:8px">
        <i class="bi bi-file-earmark-pdf me-1"></i>PDF</a>
      <a th:href="@{/admin/reports/download(format='xlsx',from=${from},to=${to},status=${status})}"
         class="btn btn-sm btn-outline-primary" style="border-radius:8px">
        <i class="bi bi-file-earmark-excel me-1"></i>Excel</a>
      <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-secondary" style="border-radius:8px">
        <i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
  </div>
  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
          <tr><th>#</th><th>Visitor</th><th>Host</th><th>Purpose</th><th>Status</th>
              <th>Check-In</th><th>Check-Out</th><th>Duration</th><th>Date</th></tr>
        </thead>
        <tbody>
          <tr th:each="log : ${logs}">
            <td class="text-muted" th:text="${log.id}"></td>
            <td class="fw-semibold" th:text="${log.visitorName}"></td>
            <td th:text="${log.hostName}"></td>
            <td th:text="${log.purpose}"></td>
            <td><span th:if="${log.status!=null}" th:class="${'bs s-'+log.status}" th:text="${log.status}"></span></td>
            <td><span th:if="${log.checkIn!=null}" th:text="${#temporals.format(log.checkIn,'HH:mm dd/MM')}"></span>
                <span th:unless="${log.checkIn!=null}" class="text-muted">—</span></td>
            <td><span th:if="${log.checkOut!=null}" th:text="${#temporals.format(log.checkOut,'HH:mm dd/MM')}"></span>
                <span th:unless="${log.checkOut!=null}" class="text-muted">—</span></td>
            <td><span th:if="${log.durationMinutes!=null}" th:text="${log.durationMinutes+' min'}"></span>
                <span th:unless="${log.durationMinutes!=null}" class="text-muted">—</span></td>
            <td><span th:if="${log.createdAt!=null}" th:text="${#temporals.format(log.createdAt,'dd MMM yyyy')}"></span>
                <span th:unless="${log.createdAt!=null}" class="text-muted">—</span></td>
          </tr>
          <tr th:if="${logs==null or #lists.isEmpty(logs)}">
            <td colspan="9" class="text-center text-muted py-5">
              <i class="bi bi-inbox fs-3 d-block mb-2 opacity-50"></i>No records found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
