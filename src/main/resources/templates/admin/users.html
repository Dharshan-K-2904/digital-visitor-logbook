<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>User Accounts – Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
body{background:#f0f2f5;font-family:"Segoe UI",sans-serif;margin:0}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:235px;background:#1a237e;display:flex;flex-direction:column;z-index:100}
.sidebar .brand{padding:22px 20px;font-size:1rem;font-weight:700;color:#fff;border-bottom:1px solid #283593;display:flex;align-items:center;gap:9px}
.sidebar a{color:#c5cae9;text-decoration:none;padding:13px 20px;display:flex;align-items:center;gap:10px;font-size:.93rem;transition:background .15s}
.sidebar a:hover,.sidebar a.active{background:#283593;color:#fff}
.sidebar a i{font-size:1.1rem;width:20px}
.sidebar .logout{margin-top:auto;border-top:1px solid #283593}
.content{margin-left:235px;padding:34px}
.card{border:none;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);background:#fff}
.card-header{border-radius:14px 14px 0 0 !important;border-bottom:1px solid #f0f0f0}
.table thead th{background:#e8eaf6;color:#1a237e;font-weight:600;font-size:.86rem;border-bottom:none;padding:12px 16px}
.table tbody td{font-size:.86rem;vertical-align:middle;padding:11px 16px}
.table-hover tbody tr:hover{background:#f8f9ff}
.bs{display:inline-block;border-radius:20px;padding:3px 13px;font-size:.75rem;font-weight:700;letter-spacing:.2px}
.s-PENDING{background:#fff3e0;color:#e65100}
.s-APPROVED{background:#e8f5e9;color:#2e7d32}
.s-REJECTED{background:#ffebee;color:#c62828}
.s-CHECKED_IN{background:#e3f2fd;color:#1565c0}
.s-CHECKED_OUT{background:#f3e5f5;color:#6a1b9a}
.sc{border-radius:16px;padding:26px;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.14)}
.sn{font-size:2.6rem;font-weight:800;line-height:1}
.sl{font-size:.83rem;opacity:.88;margin-top:7px}
.c1{background:linear-gradient(135deg,#3949ab,#1a237e)}
.c2{background:linear-gradient(135deg,#00897b,#004d40)}
.c3{background:linear-gradient(135deg,#fb8c00,#bf360c)}
.c4{background:linear-gradient(135deg,#8e24aa,#4a148c)}
.rp{display:inline-block;border-radius:20px;padding:3px 13px;font-size:.75rem;font-weight:700}
.r-ADMIN{background:#fce4ec;color:#880e4f}
.r-HOST{background:#e8eaf6;color:#1a237e}
.r-VISITOR{background:#e8f5e9;color:#1b5e20}
.r-SECURITY{background:#fff3e0;color:#bf360c}
.ba{width:33px;height:33px;display:inline-flex;align-items:center;justify-content:center;
    border-radius:9px;border:1.5px solid;padding:0;background:#fff;cursor:pointer;transition:all .15s}
.ba:hover{opacity:.75;transform:scale(1.05)}
.ba.edit{border-color:#1a237e;color:#1a237e}
.ba.tog{border-color:#f59e0b;color:#f59e0b}
.ba.del{border-color:#dc2626;color:#dc2626}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand"><i class="bi bi-shield-lock-fill"></i> Admin Panel</div>
  <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart-line"></i> Reports</a>
  <a th:href="@{/admin/users}" class="active"><i class="bi bi-people-fill"></i> User Accounts</a>
  <a th:href="@{/logout}" class="logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
</div>
<div class="content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-0">User Accounts</h4>
      <p class="text-muted mb-0 small">Manage all system users</p>
    </div>
    <a th:href="@{/admin/users/add}" class="btn btn-primary">
      <i class="bi bi-person-plus me-1"></i>Add User</a>
  </div>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 px-3 mb-3" style="border-radius:10px">
    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
          <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td class="fw-semibold" th:text="${u.name}"></td>
            <td class="text-muted" th:text="${u.email}"></td>
            <td><span th:if="${u.role!=null}" th:class="${'rp r-'+u.role}" th:text="${u.role}"></span></td>
            <td>
              <span th:if="${u.active}" class="badge bg-success px-3 py-2" style="border-radius:8px">Active</span>
              <span th:unless="${u.active}" class="badge bg-secondary px-3 py-2" style="border-radius:8px">Inactive</span>
            </td>
            <td>
              <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="ba edit me-1" title="Edit">
                <i class="bi bi-pencil" style="font-size:.8rem"></i></a>
              <form th:action="@{/admin/users/toggle/{id}(id=${u.id})}" method="post" class="d-inline">
                <button type="submit" class="ba tog me-1" th:title="${u.active?'Deactivate':'Activate'}">
                  <i th:class="${u.active?'bi bi-toggle-on':'bi bi-toggle-off'}" style="font-size:.95rem"></i>
                </button>
              </form>
              <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" class="d-inline"
                    onsubmit="return confirm('Delete this user permanently?')">
                <button type="submit" class="ba del" title="Delete">
                  <i class="bi bi-trash" style="font-size:.8rem"></i></button>
              </form>
            </td>
          </tr>
          <tr th:if="${users==null or #lists.isEmpty(users)}">
            <td colspan="6" class="text-center text-muted py-5">
              <i class="bi bi-people fs-3 d-block mb-2 opacity-50"></i>No users found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
