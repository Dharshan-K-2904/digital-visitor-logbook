<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>User Accounts – Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="sidebar">
  <div class="brand"><i class="bi bi-shield-lock-fill"></i> Admin Panel</div>
  <a th:href="@{/admin/profile}" class="sidebar-user">
    <div class="sidebar-avatar" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">
      <span th:text="${user.name != null ? #strings.substring(user.name,0,1).toUpperCase() : 'A'}">A</span>
    </div>
    <div class="sidebar-user-info">
      <div class="name" th:text="${user.name}">Admin</div>
      <div class="role">Administrator</div>
    </div>
  </a>
  <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a th:href="@{/admin/users}"><i class="bi bi-people"></i> User Management</a>
  <a th:href="@{/admin/reports}"><i class="bi bi-file-earmark-bar-graph"></i> Visit Reports</a>
  <div class="nav-section">System</div>
  <a th:href="@{/admin/settings}"><i class="bi bi-gear"></i> System Settings</a>
  <a th:href="@{/admin/profile}"><i class="bi bi-person-badge"></i> My Profile</a>
  <div class="logout"><a th:href="@{/logout}"><i class="bi bi-box-arrow-left"></i> Logout</a></div>
</div>

<div class="content fade-in">
  <div class="page-header">
    <div>
      <h4>User Accounts</h4>
      <p>Manage all system users and their roles</p>
    </div>
    <a th:href="@{/admin/users/add}" class="btn btn-primary" style="border-radius:10px;font-weight:600">
      <i class="bi bi-person-plus me-1"></i>Add User
    </a>
  </div>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 px-3 mb-3" style="border-radius:12px">
    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
          <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td class="text-muted" th:text="${u.id}"></td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);
                            display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.8rem;flex-shrink:0"
                     th:text="${u.name != null ? #strings.substring(u.name,0,1).toUpperCase() : '?'}">U</div>
                <span class="fw-semibold" th:text="${u.name}"></span>
              </div>
            </td>
            <td class="text-muted" th:text="${u.email}"></td>
            <td><span th:if="${u.role!=null}" th:class="${'rp r-'+u.role}" th:text="${u.role}"></span></td>
            <td>
              <span th:if="${u.active}" class="badge bg-success px-3 py-2" style="border-radius:8px">Active</span>
              <span th:unless="${u.active}" class="badge bg-secondary px-3 py-2" style="border-radius:8px">Inactive</span>
            </td>
            <td class="text-muted">
              <span th:if="${u.createdAt != null}" th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></span>
              <span th:unless="${u.createdAt != null}">—</span>
            </td>
            <td>
              <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="ba edit me-1" title="Edit">
                <i class="bi bi-pencil" style="font-size:.8rem"></i>
              </a>
              <form th:action="@{/admin/users/toggle/{id}(id=${u.id})}" method="post" class="d-inline">
                <button type="submit" class="ba tog me-1" th:title="${u.active?'Deactivate':'Activate'}">
                  <i th:class="${u.active?'bi bi-toggle-on':'bi bi-toggle-off'}" style="font-size:.95rem"></i>
                </button>
              </form>
              <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" class="d-inline"
                    onsubmit="return confirm('Delete this user permanently?')">
                <button type="submit" class="ba del" title="Delete">
                  <i class="bi bi-trash" style="font-size:.8rem"></i>
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${users==null or #lists.isEmpty(users)}">
            <td colspan="7" class="text-center text-muted py-5">
              <i class="bi bi-people fs-3 d-block mb-2 opacity-50"></i>No users found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
