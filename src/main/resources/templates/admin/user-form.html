<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>User Form – Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="sidebar">
  <div class="brand"><i class="bi bi-shield-lock-fill"></i> Admin Panel</div>
  <a th:href="@{/admin/profile}" class="sidebar-user">
    <div class="sidebar-avatar" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">
      <span th:text="${user.name != null ? #strings.substring(user.name,0,1).toUpperCase() : 'A'}">A</span>
    </div>
    <div class="sidebar-user-info">
      <div class="name" th:text="${user.name}">Admin</div>
      <div class="role">Administrator</div>
    </div>
  </a>
  <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a th:href="@{/admin/users}" class="active"><i class="bi bi-people"></i> User Management</a>
  <a th:href="@{/admin/reports}"><i class="bi bi-file-earmark-bar-graph"></i> Visit Reports</a>
  <div class="nav-section">System</div>
  <a th:href="@{/admin/settings}"><i class="bi bi-gear"></i> System Settings</a>
  <a th:href="@{/admin/profile}"><i class="bi bi-person-badge"></i> My Profile</a>
  <div class="logout"><a th:href="@{/logout}"><i class="bi bi-box-arrow-left"></i> Logout</a></div>
</div>
<div class="content fade-in">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm" style="border-radius:8px">
      <i class="bi bi-arrow-left"></i></a>
    <div>
      <h4 class="fw-bold mb-0" th:text="${isEdit}?'Edit User':'Add New User'">Form</h4>
      <p class="text-muted mb-0 small" th:text="${isEdit}?'Update user account details':'Create a new system user'"></p>
    </div>
  </div>
  <div class="card" style="max-width:580px">
    <div class="card-body p-4">
      <form th:action="${isEdit?'/admin/users/edit/'+formUser.id:'/admin/users/add'}"
            th:object="${formUser}" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Full Name</label>
          <input type="text" class="form-control" th:field="*{name}" placeholder="e.g. John Smith" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Email Address</label>
          <input type="email" class="form-control" th:field="*{email}" placeholder="john@company.com" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Role</label>
          <select class="form-select" th:field="*{role}" required>
            <option value="">-- Select Role --</option>
            <option value="VISITOR">Visitor</option>
            <option value="HOST">Host (Employee)</option>
            <option value="SECURITY">Security Personnel</option>
            <option value="ADMIN">Administrator</option>
          </select>
        </div>
        <div class="mb-3" th:unless="${isEdit}">
          <label class="form-label fw-semibold small">Password</label>
          <input type="password" class="form-control" th:field="*{password}" placeholder="Set a password" required/>
        </div>
        <div class="mb-4 p-3 bg-light rounded-3" th:if="${isEdit}">
          <div class="form-check mb-0">
            <input type="checkbox" class="form-check-input" th:field="*{active}" id="chkActive"/>
            <label class="form-check-label fw-semibold" for="chkActive">Account is Active</label>
          </div>
          <small class="text-muted">Uncheck to deactivate without deleting.</small>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4" style="border-radius:10px">
            <i class="bi bi-check2-circle me-1"></i>Save User</button>
          <a th:href="@{/admin/users}" class="btn btn-outline-secondary" style="border-radius:10px">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
