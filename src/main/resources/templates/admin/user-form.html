<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>User Form – Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<style>body{background:#f0f2f5;font-family:"Segoe UI",sans-serif;margin:0}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:235px;background:#1a237e;display:flex;flex-direction:column;z-index:100}
.sidebar .brand{padding:22px 20px;font-size:1rem;font-weight:700;color:#fff;border-bottom:1px solid #283593;display:flex;align-items:center;gap:9px}
.sidebar a{color:#c5cae9;text-decoration:none;padding:13px 20px;display:flex;align-items:center;gap:10px;font-size:.93rem;transition:background .15s}
.sidebar a:hover,.sidebar a.active{background:#283593;color:#fff}
.sidebar a i{font-size:1.1rem;width:20px}
.sidebar .logout{margin-top:auto;border-top:1px solid #283593}
.content{margin-left:235px;padding:34px}
.card{border:none;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);background:#fff}
.card-header{border-radius:14px 14px 0 0 !important;border-bottom:1px solid #f0f0f0}
.table thead th{background:#e8eaf6;color:#1a237e;font-weight:600;font-size:.86rem;border-bottom:none;padding:12px 16px}
.table tbody td{font-size:.86rem;vertical-align:middle;padding:11px 16px}
.table-hover tbody tr:hover{background:#f8f9ff}
.bs{display:inline-block;border-radius:20px;padding:3px 13px;font-size:.75rem;font-weight:700;letter-spacing:.2px}
.s-PENDING{background:#fff3e0;color:#e65100}
.s-APPROVED{background:#e8f5e9;color:#2e7d32}
.s-REJECTED{background:#ffebee;color:#c62828}
.s-CHECKED_IN{background:#e3f2fd;color:#1565c0}
.s-CHECKED_OUT{background:#f3e5f5;color:#6a1b9a}
.sc{border-radius:16px;padding:26px;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.14)}
.sn{font-size:2.6rem;font-weight:800;line-height:1}
.sl{font-size:.83rem;opacity:.88;margin-top:7px}
.c1{background:linear-gradient(135deg,#3949ab,#1a237e)}
.c2{background:linear-gradient(135deg,#00897b,#004d40)}
.c3{background:linear-gradient(135deg,#fb8c00,#bf360c)}
.c4{background:linear-gradient(135deg,#8e24aa,#4a148c)}</style>
</head>
<body>
<div class="sidebar">
  <div class="brand"><i class="bi bi-shield-lock-fill"></i> Admin Panel</div>
  <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart-line"></i> Reports</a>
  <a th:href="@{/admin/users}" class="active"><i class="bi bi-people-fill"></i> User Accounts</a>
  <a th:href="@{/logout}" class="logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
</div>
<div class="content">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0" th:text="${isEdit}?'Edit User':'Add New User'">Form</h4>
  </div>
  <div class="card" style="max-width:560px">
    <div class="card-body p-4">
      <form th:action="${isEdit?'/admin/users/edit/'+formUser.id:'/admin/users/add'}"
            th:object="${formUser}" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" th:field="*{name}" placeholder="e.g. John Smith" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" class="form-control" th:field="*{email}" placeholder="john@company.com" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Role</label>
          <select class="form-select" th:field="*{role}" required>
            <option value="">-- Select Role --</option>
            <option value="VISITOR">Visitor</option>
            <option value="HOST">Host (Employee)</option>
            <option value="SECURITY">Security Personnel</option>
            <option value="ADMIN">Administrator</option>
          </select>
        </div>
        <div class="mb-3" th:unless="${isEdit}">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" th:field="*{password}" placeholder="Set a password" required/>
        </div>
        <div class="mb-4 p-3 bg-light rounded-3" th:if="${isEdit}">
          <div class="form-check mb-0">
            <input type="checkbox" class="form-check-input" th:field="*{active}" id="chkActive"/>
            <label class="form-check-label fw-semibold" for="chkActive">Account is Active</label>
          </div>
          <small class="text-muted">Uncheck to deactivate without deleting.</small>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check2-circle me-1"></i>Save User</button>
          <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
