<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Host Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<style>
  .sidebar{background:linear-gradient(180deg,#1b2a4a 0%,#0d1b2e 100%) !important;}
  .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,0.08) !important;border-left-color:#60a5fa !important;}
  .sidebar-avatar{background:linear-gradient(135deg,#2563eb,#1d4ed8) !important;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand"><i class="bi bi-person-badge-fill"></i> Host Portal</div>
  <a th:href="@{/host/profile}" class="sidebar-user">
    <div class="sidebar-avatar">
      <span th:text="${user != null and user.name != null ? #strings.substring(user.name,0,1).toUpperCase() : 'H'}">H</span>
    </div>
    <div class="sidebar-user-info">
      <div class="name" th:text="${user != null ? user.name : 'Host'}">Host</div>
      <div class="role">Host / Employee</div>
    </div>
  </a>
  <a th:href="@{/host/dashboard}" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <div class="nav-section">Account</div>
  <a th:href="@{/host/profile}"><i class="bi bi-person-circle"></i> My Profile</a>
  <div class="logout"><a th:href="@{/logout}"><i class="bi bi-box-arrow-left"></i> Logout</a></div>
</div>

<div class="content fade-in">
  <div class="page-header">
    <div>
      <h4>Host Dashboard</h4>
      <p>Welcome, <strong th:text="${user != null ? user.name : 'Host'}">Host</strong> 👋</p>
    </div>
    <span class="badge px-3 py-2" style="border-radius:10px;font-size:.82rem;background:#2563eb;color:#fff">
      <i class="bi bi-calendar3 me-1"></i>
      <span th:text="${#temporals.format(#temporals.createNow(),'dd MMM yyyy')}"></span>
    </span>
  </div>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 px-3 mb-3" style="border-radius:12px">
    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="sc ca">
        <div class="sn" th:text="${pending}">0</div>
        <div class="sl"><i class="bi bi-hourglass-split"></i> Pending Approval</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="sc cb">
        <div class="sn" th:text="${approved}">0</div>
        <div class="sl"><i class="bi bi-check-circle"></i> Approved</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="sc cd">
        <div class="sn" th:text="${checkedIn}">0</div>
        <div class="sl"><i class="bi bi-door-open"></i> Inside Now</div>
      </div>
    </div>
  </div>

  <!-- Visit Requests Table -->
  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3 px-4">
      <span class="fw-semibold"><i class="bi bi-people me-2 text-primary"></i>Visit Requests</span>
    </div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead>
          <tr><th>#</th><th>Visitor</th><th>Purpose</th><th>Visit Date</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="r : ${requests}">
            <td class="text-muted" th:text="${r.id}"></td>
            <td class="fw-semibold" th:text="${r.visitorName}"></td>
            <td th:text="${r.purpose}"></td>
            <td>
              <span th:if="${r.visitDate != null}" th:text="${#temporals.format(r.visitDate,'dd MMM yyyy')}"></span>
              <span th:unless="${r.visitDate != null}" class="text-muted">—</span>
            </td>
            <td>
              <span th:if="${r.status != null}" th:class="${'bs s-' + r.status}" th:text="${r.status}"></span>
            </td>
            <td>
              <span th:if="${r.status == 'PENDING'}">
                <form th:action="@{/host/approve/{id}(id=${r.id})}" method="post" class="d-inline">
                  <button class="btn btn-sm btn-success me-1" style="border-radius:8px">
                    <i class="bi bi-check-lg me-1"></i>Approve
                  </button>
                </form>
                <form th:action="@{/host/reject/{id}(id=${r.id})}" method="post" class="d-inline"
                      th:id="${'rf' + r.id}">
                  <input type="hidden" name="reason" th:id="${'rsn' + r.id}" value=""/>
                  <button type="button" class="btn btn-sm btn-outline-danger" style="border-radius:8px"
                          th:attr="onclick='askReject(' + ${r.id} + ')'">
                    <i class="bi bi-x-lg me-1"></i>Reject
                  </button>
                </form>
              </span>
              <span th:unless="${r.status == 'PENDING'}" class="text-muted small">—</span>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="6" class="text-center text-muted py-5">
              <i class="bi bi-inbox fs-3 d-block mb-2 opacity-50"></i>No visit requests.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function askReject(id){
    const reason = prompt('Reason for rejection (optional):') || '';
    document.getElementById('rsn' + id).value = reason;
    document.getElementById('rf' + id).submit();
}
</script>
</body></html>
