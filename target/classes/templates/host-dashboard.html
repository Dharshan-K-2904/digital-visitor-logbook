<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Host Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/app.js"></script>
</head>

<body onload="showToast('Welcome Host!')">

<div id="toast" class="toast"></div>

<div class="navbar">
<h2>Host Dashboard</h2>
<div>
<span class="toggle-btn" onclick="toggleDarkMode()">🌙</span>
<a href="/logout">Logout</a>
</div>
</div>

<table>
<tr>
<th>Purpose</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr th:each="r : ${requests}">
<td th:text="${r.purpose}"></td>
<td th:text="${r.status}"></td>

<td>
<form action="/approve" method="post" onsubmit="showToast('Approved')">
<input type="hidden" name="id" th:value="${r.id}">
<button class="approve-btn">Approve</button>
</form>

<form action="/reject" method="post" onsubmit="showToast('Rejected')">
<input type="hidden" name="id" th:value="${r.id}">
<button class="reject-btn">Reject</button>
</form>
</td>
</tr>

</table>

</body>
</html>
